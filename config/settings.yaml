# ==========================================================
# Siva Scalping Bot - Main Settings
# ==========================================================
# Edit this file to control bot behaviour.
# For sensitive credentials (API keys, access tokens), edit
# config/credentials.yaml instead.
# ==========================================================

mode:
  # "paper" = simulate trades with live prices, no real orders
  # "live"  = place real orders via Kite Connect API
  trading_mode: paper

# ----------------------------------------------------------
# Strategy selection
# ----------------------------------------------------------
# Change this ONE line to switch strategies. Each strategy
# declares its own candle timeframe, indicator parameters
# and exit rules. Everything else (risk, execution, logging)
# stays identical so results are directly comparable.
#
#   scalping  → Two Candle Theory (SuperTrend, RSI, VWAP, PSAR) — 3-min chart
#   ichimoku  → Ichimoku Kinko Hyo (cloud, TK cross, Kijun magnet) — 1-min chart
# ----------------------------------------------------------
strategy:
  type: ichimoku   # scalping | ichimoku

capital:
  # Maximum capital allocated for the day (INR)
  # NO leverage is used. This is your hard cap on premium outflow.
  daily_budget: 100000

  # Maximum loss allowed per day as % of daily_budget (1% = stop trading)
  max_daily_loss_pct: 1.0

  # Signal-strength based capital allocation (% of daily_budget per trade)
  allocation:
    strong: 30    # all 6 conditions + volume spike >= 1.5x
    medium: 20    # 5 of 6 conditions met
    weak: 0       # disabled per user requirement

instrument:
  # Trading instrument
  symbol: BANKNIFTY
  exchange: NFO
  lot_size: 15
  max_lots_per_trade: 3

  # Strike selection
  strike_type: ATM          # ATM | ITM_1 | OTM_1
  expiry_type: current_week # current_week | next_week | monthly

timeframe:
  # NOTE: the primary candle timeframe is now declared by each strategy
  # (scalping.timeframe / ichimoku.timeframe). This section keeps only
  # the shared positional-filter and warmup settings.
  positional: 15minute        # 15-min chart used by the positional trend filter
  warmup_candles: 1           # completed candles required before first entry

session:
  market_open:  "09:15"
  market_close: "15:30"
  # Square off all positions at this time (10 min before close)
  square_off_time: "15:20"
  # WebSocket lifecycle window
  ws_pre_open_minutes: 15     # WS starts this many minutes BEFORE market open  (09:00 IST)
  ws_post_close_minutes: 15   # WS auto-stops this many minutes AFTER close     (15:45 IST)

# ----------------------------------------------------------
# Scalping strategy parameters  (used when strategy.type = scalping)
# ----------------------------------------------------------
scalping:
  timeframe: 3minute   # candle interval for candle aggregator + historical seed

  supertrend:
    period: 10
    multiplier: 3      # was 2 — increased to reduce whipsaws (Siva methodology)

  rsi:
    period: 14
    overbought: 80
    oversold: 20
    long_min: 50       # long entry: RSI must be >= this
    short_max: 50      # short entry: RSI must be <= this

  vwap:
    anchor: session    # resets each trading session at 09:15

  psar:
    acceleration: 0.02
    max_acceleration: 0.2

  volume:
    # KiteTicker does NOT provide volume_traded for NSE indices.
    # We subscribe the nearest BankNifty futures contract for real volume.
    # Set to 0 to treat volume filter as always-passed (disable it).
    banknifty_threshold: 0
    nifty_threshold: 0

# ----------------------------------------------------------
# Ichimoku strategy parameters  (used when strategy.type = ichimoku)
# ----------------------------------------------------------
ichimoku:
  timeframe: 1minute   # 1-min chart — same CandleAggregator, different interval

  # Classic Ichimoku periods (designed for daily charts; work on 1-min for intraday)
  tenkan_period:   9    # Conversion line (fast)
  kijun_period:   26    # Base line (slow "magnet")
  senkou_b_period: 52   # Leading Span B period
  displacement:   26    # Forward shift for cloud display (also Chikou lookback)

  # Kijun magnet filter (Discussion C key insight):
  # When Kijun is flat, price is in equilibrium and will snap back — don't trade away from it.
  # Slope is measured as % change in Kijun over last 5 candles.
  # If abs(slope) < kijun_flat_tolerance_pct of Kijun value → considered flat → entry blocked.
  require_kijun_slope: true
  kijun_flat_tolerance_pct: 0.05   # 0.05% tolerance

  # Price must be above or below the cloud (not inside) for a trade to fire.
  # Inside the cloud = ambiguous/uncertain — Ichimoku's "no man's land".
  require_price_outside_cloud: true

  # Minimum volume ratio (current / 20-candle avg) for entry confirmation.
  # Set to 1.0 to require at-least-average volume; 0.0 to disable.
  min_volume_ratio: 1.0

  volume:
    banknifty_threshold: 0   # absolute threshold (0 = use min_volume_ratio instead)
    nifty_threshold: 0

# ----------------------------------------------------------
# Positional trend filter — shared across ALL strategies
# ----------------------------------------------------------
# Used for re-entry validation after a stop-loss: the 15-min SuperTrend
# must agree with the intended trade direction before re-entering.
indicators:
  positional:
    supertrend:
      period: 7
      multiplier: 3
    rsi:
      period: 14
      overbought: 70
      oversold: 30

trade_rules:
  # Two Candle Theory confirmation
  require_consecutive_candles: 2
  # Cool-down after SL hit (in candle count on primary timeframe)
  cooldown_candles: 2
  # Maximum simultaneous positions (0 = unlimited, capital-limited)
  max_open_positions: 0
  # Minimum time between trades (seconds) to avoid rapid re-fire
  min_time_between_trades_sec: 30
  # Early session filter: skip entry signals before this time (HH:MM IST).
  # First 15 min after open (09:15-09:30) are pure price discovery — too noisy.
  no_entry_before: "09:30"
  # Consecutive loss circuit breaker: pause entries for N candles after this many
  # consecutive losing trades (SL/flip exits in a row). Resets on a winning trade.
  max_consecutive_losses: 2
  consecutive_loss_pause_candles: 6
  # No-trade windows: block ALL entries during specified time ranges (HH:MM IST).
  # Lunch hour (11:00-13:00) is institutionally dead — choppy, low conviction.
  # Add more windows as a list of {start, end} pairs if needed.
  no_trade_windows:
    - { start: "11:00", end: "13:00" }   # Lunch dead zone

stop_loss:
  trailing:
    enabled: true
    points_trail_step: 5        # move SL by 5 pts for every 5 pts gain
    activation_profit_pts: 10   # start trailing after 10 pts profit (MEDIUM signals)
    strong_activation_profit_pts: 15  # wider activation for STRONG signals (3 lots — needs more room)
    exit_on_supertrend_flip: true  # scalping: SuperTrend flip | ichimoku: TK cross / cloud re-entry

  # Target profit: 30 pts gives 1.5:1 R:R against a 20-pt SL.
  # Minimum to be profitable at ~40% win rate. Do not set below 20.
  target_points: 30
  # Max risk per trade in points (hard ceiling)
  max_risk_points: 20

gap_protection:
  gap_threshold_pct: 0.5
  square_off_on_gap_sl_miss: true

re_entry:
  require_positional_trend_agreement: true

paper_trading:
  slippage_bps: 5

market_regime:
  enabled: true
  vix_range_max: 13.0
  vix_volatile_min: 25.0

dashboard:
  refresh_interval_sec: 1
  max_trades_display: 20

logging:
  console_level: INFO
  file_level: DEBUG
  trade_log_file: logs/trades.csv
  system_log_file: logs/system.log

notifications:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
